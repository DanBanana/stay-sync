<div class="page-header">
  <button mat-icon-button (click)="goBack()" matTooltip="Back to Properties">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <h2>ICS Calendars</h2>
  <span class="spacer"></span>
  <button mat-stroked-button (click)="viewBookings()">
    <mat-icon>event</mat-icon> View Bookings
  </button>
  <button mat-flat-button color="primary" (click)="openAddCalendar()">
    <mat-icon>add</mat-icon> Add Calendar
  </button>
</div>

<div *ngIf="loading$ | async" class="loading-center">
  <mat-spinner diameter="40"></mat-spinner>
</div>

<div *ngIf="!(loading$ | async)" class="table-container">
  <table mat-table [dataSource]="(calendars$ | async) ?? []" class="full-width-table">
    <ng-container matColumnDef="platform">
      <th mat-header-cell *matHeaderCellDef>Platform</th>
      <td mat-cell *matCellDef="let cal">{{ cal.platform }}</td>
    </ng-container>

    <ng-container matColumnDef="icsUrl">
      <th mat-header-cell *matHeaderCellDef>ICS URL</th>
      <td mat-cell *matCellDef="let cal" class="url-cell">
        <span class="url-text" [matTooltip]="cal.icsUrl">{{ cal.icsUrl }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="lastSyncedAt">
      <th mat-header-cell *matHeaderCellDef>Last Synced</th>
      <td mat-cell *matCellDef="let cal">
        {{ cal.lastSyncedAt ? (cal.lastSyncedAt | date:'medium') : 'Never' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let cal">
        <button mat-icon-button color="warn" (click)="deleteCalendar(cal)" matTooltip="Remove">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <div *ngIf="(calendars$ | async)?.length === 0" class="empty-state">
    <mat-icon>link_off</mat-icon>
    <p>No calendars yet. Add an ICS URL to start syncing bookings.</p>
  </div>
</div>
