<main class="login-container">
  <div class="login-card">
    <h1>StaySync</h1>
    <p class="subtitle">Sign in to your account</p>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" />
        <mat-error *ngIf="form.get('email')?.invalid">Enter a valid email address.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput [type]="showPassword ? 'text' : 'password'" formControlName="password" autocomplete="current-password" />
        <button mat-icon-button matSuffix type="button" (click)="showPassword = !showPassword" [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
          <fa-icon [icon]="showPassword ? faEyeSlash : faEye"></fa-icon>
        </button>
        <mat-error *ngIf="form.get('password')?.invalid">Password is required.</mat-error>
      </mat-form-field>

      <div class="error-banner" *ngIf="error$ | async as error">
        {{ error }}
      </div>

      <button mat-flat-button color="primary" type="submit" class="submit-btn" [disabled]="loading$ | async">
        {{ (loading$ | async) ? 'Signing in...' : 'Sign in' }}
      </button>

    </form>
  </div>
</main>
