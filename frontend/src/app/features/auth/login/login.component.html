<main class="login-container">
  <div class="login-card">
    <h1>StaySync</h1>
    <p class="subtitle">Sign in to your account</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
        <span class="error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Enter a valid email address.
        </span>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
        <span class="error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Password is required.
        </span>
      </div>

      <div class="error-banner" *ngIf="error$ | async as error">
        {{ error }}
      </div>

      <button type="submit" [disabled]="loading$ | async">
        {{ (loading$ | async) ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
  </div>
</main>
