<h2 mat-dialog-title>Booking Details</h2>

<mat-dialog-content>
  <table class="detail-table">
    <tr>
      <td class="label">Room</td>
      <td>{{ booking.roomName }}</td>
    </tr>
    <tr>
      <td class="label">Platform</td>
      <td>{{ booking.platform }}</td>
    </tr>
    <tr>
      <td class="label">Check-in</td>
      <td>{{ booking.checkIn | date:'mediumDate' }}</td>
    </tr>
    <tr>
      <td class="label">Check-out</td>
      <td>{{ booking.checkOut | date:'mediumDate' }}</td>
    </tr>
    <tr>
      <td class="label">Duration</td>
      <td>{{ nights }} night{{ nights !== 1 ? 's' : '' }}</td>
    </tr>
    <tr>
      <td class="label">Status</td>
      <td>{{ booking.status }}</td>
    </tr>
    <tr *ngIf="booking.guestName">
      <td class="label">Guest</td>
      <td>{{ booking.guestName }}</td>
    </tr>
  </table>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <ng-container *ngIf="isManual">
    <button mat-button color="warn" (click)="onDelete()">Delete</button>
    <button mat-button (click)="onEdit()">Edit</button>
  </ng-container>
  <button mat-button (click)="dialogRef.close()">Close</button>
</mat-dialog-actions>
