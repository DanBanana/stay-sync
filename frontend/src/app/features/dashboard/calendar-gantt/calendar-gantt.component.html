<div class="gantt-wrapper">
  <div class="gantt-grid">
    <!-- Header corner -->
    <div class="gantt-header-corner"></div>

    <!-- Date headers -->
    <div
      *ngFor="let day of days"
      class="gantt-header-cell"
      [class.today]="isToday(day)"
    >
      <span class="day-name">{{ day | date:'EEE' }}</span>
      <span class="day-num">{{ day | date:'d' }}</span>
    </div>

    <!-- Room rows -->
    <ng-container *ngFor="let room of rooms">
      <div class="gantt-room-label" [style.height]="rowHeight(room)" [title]="room.roomName">
        <span class="room-name">{{ room.roomName }}</span>
        <span *ngIf="room.conflictCount > 0" class="room-conflict-badge"><fa-icon [icon]="faTriangleExclamation"></fa-icon> {{ room.conflictCount }}</span>
      </div>
      <div class="gantt-row-cells" [style.height]="rowHeight(room)">
        <!-- Day cell backgrounds (for grid lines + today highlight) -->
        <div
          *ngFor="let day of days"
          class="gantt-day-cell"
          [class.today]="isToday(day)"
          (click)="cellClicked.emit({ roomId: room.roomId, date: day })"
        ></div>

        <!-- Booking bars -->
        <div
          *ngFor="let booking of bookingsForRoom(room.roomId)"
          class="booking-bar platform-{{ platformClass(booking.platform) }}"
          [class.conflict]="booking.hasConflict"
          [style.left]="barStyle(booking)['left']"
          [style.width]="barStyle(booking)['width']"
          [style.top]="barStyle(booking)['top']"
          [matTooltip]="barTooltip(booking)"
          matTooltipPosition="above"
          matTooltipClass="tooltip-multiline"
          (click)="onBarClick($event, booking)"
        >
          <fa-icon *ngIf="booking.hasConflict" [icon]="faTriangleExclamation" class="conflict-badge"></fa-icon>
          <span class="bar-label">{{ booking.platform }}</span>
        </div>
      </div>
    </ng-container>

    <!-- Empty state -->
    <ng-container *ngIf="rooms.length === 0">
      <div class="gantt-empty">No bookings in this period.</div>
    </ng-container>
  </div>
</div>
