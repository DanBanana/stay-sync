<header class="page-header">
  <button mat-icon-button (click)="goBack()" matTooltip="Back to Calendars">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <h2>Bookings</h2>
</header>

<div *ngIf="loading$ | async" class="loading-center">
  <mat-spinner diameter="40"></mat-spinner>
</div>

<div *ngIf="!(loading$ | async)" class="table-container">
  <table mat-table [dataSource]="(bookings$ | async) ?? []" class="full-width-table">
    <ng-container matColumnDef="checkIn">
      <th mat-header-cell *matHeaderCellDef>Check In</th>
      <td mat-cell *matCellDef="let b">{{ b.checkIn }}</td>
    </ng-container>

    <ng-container matColumnDef="checkOut">
      <th mat-header-cell *matHeaderCellDef>Check Out</th>
      <td mat-cell *matCellDef="let b">{{ b.checkOut }}</td>
    </ng-container>

    <ng-container matColumnDef="guestName">
      <th mat-header-cell *matHeaderCellDef>Guest</th>
      <td mat-cell *matCellDef="let b">{{ b.guestName ?? '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let b">
        <mat-chip [color]="statusColor(b.status)" highlighted>{{ b.status }}</mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="rawSummary">
      <th mat-header-cell *matHeaderCellDef>Notes</th>
      <td mat-cell *matCellDef="let b">{{ b.rawSummary ?? '—' }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <div *ngIf="(bookings$ | async)?.length === 0" class="empty-state">
    <mat-icon>event_busy</mat-icon>
    <p>No bookings yet.<br>Add an ICS calendar to start syncing.</p>
  </div>
</div>
